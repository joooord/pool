<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOP Generator | Hospitality AI Toolkit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f0f0f;
      --accent: #d4a85a;
      --card: #1a1a1a;
      --muted: #7d7d7d;
      --document-bg: #f9f7f2;
      --document-text: #141414;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: #f2f2f2;
      min-height: 100vh;
      line-height: 1.5;
    }

    header {
      padding: 2.5rem 1.5rem 1rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    header h1 {
      margin: 0;
      font-size: clamp(2rem, 3vw, 2.75rem);
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    header p {
      margin: 0.35rem 0 0;
      color: var(--muted);
      max-width: 60ch;
    }

    .app-shell {
      display: grid;
      gap: 1.5rem;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem 3rem;
    }

    .panel {
      background: var(--card);
      border: 1px solid rgba(212, 168, 90, 0.25);
      border-radius: 18px;
      padding: 1.5rem;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    .panel h2 {
      margin-top: 0;
      font-size: 1.1rem;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--accent);
    }

    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 0.4rem;
      color: #fdf4dd;
    }

    input[type="text"],
    input[type="number"],
    textarea,
    select {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 0.85rem 0.9rem;
      background: rgba(255, 255, 255, 0.04);
      color: #f9f9f9;
      font-size: 0.95rem;
      transition: border 0.2s ease;
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: var(--accent);
    }

    textarea {
      min-height: 180px;
      resize: vertical;
    }

    .inline-inputs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
    }

    .tone-options {
      display: grid;
      gap: 0.65rem;
      margin-top: 0.35rem;
    }

    .tone-options label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 400;
      color: #f0f0f0;
    }

    .tone-options input {
      accent-color: var(--accent);
    }

    button {
      appearance: none;
      border: none;
      background: var(--accent);
      color: #120c03;
      font-weight: 600;
      font-size: 1rem;
      border-radius: 999px;
      padding: 0.95rem 1.75rem;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 12px 25px rgba(212, 168, 90, 0.35);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    .secondary-btn {
      background: transparent;
      border: 1px solid rgba(212, 168, 90, 0.4);
      color: #f5e3c2;
      box-shadow: none;
    }

    .secondary-btn:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
    }

    .output-panel {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-height: 100%;
    }

    .document-shell {
      flex: 1;
      background: var(--document-bg);
      color: var(--document-text);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.08);
      min-height: 600px;
    }

    .document-shell h3 {
      margin: 0;
      font-size: 1.35rem;
      letter-spacing: 0.01em;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 0.5rem 1.5rem;
      font-size: 0.95rem;
      margin-top: 0.65rem;
    }

    .section {
      margin-top: 1.5rem;
    }

    .section h4 {
      margin: 0 0 0.4rem;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #5a4b2b;
    }

    ol {
      padding-left: 1.25rem;
      margin: 0;
    }

    ol li {
      margin-bottom: 0.45rem;
    }

    .placeholder {
      color: rgba(20, 20, 20, 0.4);
      font-style: italic;
    }

    .status-line {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .status-line strong {
      color: var(--accent);
    }

    .signoff {
      display: flex;
      gap: 2rem;
      margin-top: 2rem;
      font-size: 0.95rem;
    }

    .signoff span {
      border-bottom: 1px solid rgba(20, 20, 20, 0.4);
      flex: 1;
      padding-bottom: 0.3rem;
    }

    .api-key-bar {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      padding: 1rem;
      border: 1px dashed rgba(212, 168, 90, 0.4);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.02);
    }

    .api-key-bar input {
      font-family: inherit;
    }

    @media (max-width: 900px) {
      .document-shell {
        min-height: auto;
      }

      .signoff {
        flex-direction: column;
      }
    }

    @media print {
      body {
        background: white;
      }

      header,
      .panel:not(.document-panel),
      .status-line,
      .actions {
        display: none !important;
      }

      .document-shell {
        box-shadow: none;
        color: #000;
        background: white;
        border-radius: 0;
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>SOP Generator</h1>
    <p>Transform messy notes into precise, print-ready Standard Operating Procedures for every hospitality department.</p>
  </header>

  <main class="app-shell">
    <section class="panel form-panel">
      <h2>Inputs</h2>
      <div class="api-key-bar">
        <label for="apiKey">OpenRouter API Key</label>
        <input type="text" id="apiKey" placeholder="sk-or-v1-..." autocomplete="off" />
        <button id="saveKey" class="secondary-btn" type="button">Save Key Securely</button>
        <small class="status-line" id="keyStatus">API key stored locally in your browser.</small>
      </div>
      <form id="sopForm">
        <label for="venue">Venue Name</label>
        <input type="text" id="venue" name="venue" placeholder="e.g. The Northern Belle" required />

        <label for="title">SOP Title</label>
        <input type="text" id="title" name="title" placeholder="e.g. Bar Closing Procedure" required />

        <label for="department">Department</label>
        <select id="department" name="department" required>
          <option value="Front of House">Front of House</option>
          <option value="Kitchen">Kitchen</option>
          <option value="Bar">Bar</option>
          <option value="Housekeeping">Housekeeping</option>
          <option value="Reception">Reception</option>
          <option value="Management">Management</option>
          <option value="Events">Events</option>
          <option value="Other">Other</option>
        </select>

        <label for="notes">Rough Notes / Description</label>
        <textarea id="notes" name="notes" placeholder="Paste raw notes or transcript here..." required></textarea>

        <div class="inline-inputs">
          <div>
            <label for="duration">Estimated Time to Complete (optional)</label>
            <input type="text" id="duration" name="duration" placeholder="e.g. 15 minutes" />
          </div>
          <div>
            <label for="safety">Safety / Compliance Notes (optional)</label>
            <input type="text" id="safety" name="safety" placeholder="e.g. COSHH checks required" />
          </div>
        </div>

        <div class="section" style="margin-top: 1.5rem;">
          <label>Tone</label>
          <div class="tone-options">
            <label><input type="radio" name="tone" value="Professional & Formal" checked /> Professional & Formal</label>
            <label><input type="radio" name="tone" value="Clear & Friendly" /> Clear & Friendly</label>
            <label><input type="radio" name="tone" value="Brief & Bullet-Only" /> Brief & Bullet-Only</label>
          </div>
        </div>

        <div class="actions">
          <button type="submit" id="generateBtn">Generate SOP</button>
          <button type="button" class="secondary-btn" id="resetBtn">Reset Form</button>
        </div>
      </form>
    </section>

    <section class="panel document-panel output-panel">
      <h2>Output</h2>
      <div class="document-shell" id="documentShell">
        <p class="placeholder">Your formatted SOP will appear here.</p>
      </div>
      <div class="actions">
        <button type="button" class="secondary-btn" id="copyBtn" disabled>Copy as Plain Text</button>
        <button type="button" id="printBtn" disabled>Print</button>
      </div>
      <div class="status-line" id="status">Waiting for input.</div>
    </section>
  </main>

  <script>
    const form = document.getElementById('sopForm');
    const generateBtn = document.getElementById('generateBtn');
    const documentShell = document.getElementById('documentShell');
    const statusEl = document.getElementById('status');
    const copyBtn = document.getElementById('copyBtn');
    const printBtn = document.getElementById('printBtn');
    const resetBtn = document.getElementById('resetBtn');
    const apiKeyInput = document.getElementById('apiKey');
    const saveKeyBtn = document.getElementById('saveKey');
    const keyStatus = document.getElementById('keyStatus');

    const SYSTEM_PROMPT = "You are an expert hospitality operations manager writing SOPs for a professional venue. Take the rough notes provided and produce a complete, unambiguous Standard Operating Procedure. Every step must be clear enough that a new staff member on their first day could follow it without asking questions. Use numbered steps. Be thorough but not verbose.";

    function loadApiKey() {
      const storedKey = localStorage.getItem('openrouter_key');
      if (storedKey) {
        apiKeyInput.value = storedKey.replace(/.(?=.{4})/g, '•');
        apiKeyInput.dataset.masked = 'true';
        keyStatus.innerHTML = '<strong>Key loaded.</strong> Ready to generate.';
      } else {
        keyStatus.textContent = 'API key stored locally in your browser.';
      }
    }

    function saveApiKey() {
      const value = apiKeyInput.value.trim();
      if (!value) {
        keyStatus.textContent = 'Enter a valid OpenRouter key before saving.';
        return;
      }
      localStorage.setItem('openrouter_key', value);
      apiKeyInput.value = value.replace(/.(?=.{4})/g, '•');
      apiKeyInput.dataset.masked = 'true';
      keyStatus.innerHTML = '<strong>Saved.</strong> Key stored locally.';
    }

    apiKeyInput.addEventListener('focus', () => {
      if (apiKeyInput.dataset.masked === 'true') {
        apiKeyInput.value = '';
        apiKeyInput.dataset.masked = 'false';
      }
    });

    saveKeyBtn.addEventListener('click', saveApiKey);

    function getApiKey() {
      const masked = apiKeyInput.dataset.masked === 'true';
      if (masked) {
        return localStorage.getItem('openrouter_key') || '';
      }
      return apiKeyInput.value.trim() || localStorage.getItem('openrouter_key') || '';
    }

    function formatDate(date = new Date()) {
      return date.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function buildUserPrompt(values) {
      return `Create a structured SOP for ${values.venue} titled "${values.title}" for the ${values.department} department. Tone: ${values.tone}. Estimated duration: ${values.duration || 'not specified'}. Safety/Compliance notes: ${values.safety || 'none provided'}.\n\nRough notes: ${values.notes}\n\nRespond ONLY in JSON with this exact schema: {"purpose": "...","scope": "...","equipment": ["item"],"steps": ["step"],"safety": "... or empty string","notesIncluded": ${values.safety ? 'true' : 'false'},"audience": "Who this SOP applies to"}.`;
    }

    function renderDocument(data, meta) {
      const equipmentList = data.equipment?.filter(Boolean) || [];
      const stepsList = data.steps?.filter(Boolean) || [];
      const safetyNotes = data.safety?.trim();

      const html = `
        <div class="title-block">
          <h3>${meta.title}</h3>
          <div class="meta-grid">
            <div><strong>Venue:</strong> ${meta.venue}</div>
            <div><strong>Department:</strong> ${meta.department}</div>
            <div><strong>Date:</strong> ${formatDate()}</div>
            <div><strong>Version:</strong> v1.0</div>
            ${meta.duration ? `<div><strong>Estimated Time:</strong> ${meta.duration}</div>` : ''}
          </div>
        </div>
        <div class="section">
          <h4>Purpose</h4>
          <p>${data.purpose || '—'}</p>
        </div>
        <div class="section">
          <h4>Scope</h4>
          <p>${data.scope || data.audience || '—'}</p>
        </div>
        ${equipmentList.length ? `
          <div class="section">
            <h4>Equipment / Materials</h4>
            <ul>${equipmentList.map(item => `<li>${item}</li>`).join('')}</ul>
          </div>
        ` : ''}
        <div class="section">
          <h4>Procedure</h4>
          ${stepsList.length ? `<ol>${stepsList.map(step => `<li>${step}</li>`).join('')}</ol>` : '<p>—</p>'}
        </div>
        ${(safetyNotes || meta.safety) ? `
          <div class="section">
            <h4>Safety & Compliance</h4>
            <p>${safetyNotes || meta.safety}</p>
          </div>
        ` : ''}
        <div class="signoff">
          <span>Completed by:</span>
          <span>Date:</span>
        </div>
      `;

      documentShell.innerHTML = html;
    }

    async function generateSOP(event) {
      event.preventDefault();
      const apiKey = getApiKey();
      if (!apiKey) {
        keyStatus.textContent = 'Add your OpenRouter key to continue.';
        apiKeyInput.focus();
        return;
      }

      const formData = new FormData(form);
      const values = Object.fromEntries(formData.entries());
      values.tone = form.querySelector('input[name="tone"]:checked').value;

      generateBtn.disabled = true;
      statusEl.textContent = 'Generating SOP...';
      documentShell.innerHTML = '<p class="placeholder">Drafting procedure…</p>';

      const payload = {
        model: 'anthropic/claude-3-5-haiku',
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          { role: 'user', content: buildUserPrompt(values) }
        ],
        temperature: 0.2,
        max_tokens: 900
      };

      try {
        const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`,
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error(`OpenRouter error: ${response.status}`);
        }

        const data = await response.json();
        const raw = data.choices?.[0]?.message?.content?.[0]?.text || data.choices?.[0]?.message?.content || '';
        let parsed;

        try {
          parsed = JSON.parse(raw);
        } catch (err) {
          throw new Error('Unable to parse AI response. Try again with clearer notes.');
        }

        renderDocument(parsed, values);
        statusEl.innerHTML = '<strong>Success.</strong> SOP ready to copy or print.';
        copyBtn.disabled = false;
        printBtn.disabled = false;
      } catch (error) {
        console.error(error);
        documentShell.innerHTML = `<p class="placeholder">${error.message}</p>`;
        statusEl.textContent = 'Generation failed. Adjust inputs and try again.';
      } finally {
        generateBtn.disabled = false;
      }
    }

    function copyPlainText() {
      const temp = document.createElement('div');
      temp.innerHTML = documentShell.innerHTML;
      const text = temp.textContent?.trim();
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        statusEl.innerHTML = '<strong>Copied.</strong> SOP plain text is in your clipboard.';
      });
    }

    function resetForm() {
      form.reset();
      documentShell.innerHTML = '<p class="placeholder">Your formatted SOP will appear here.</p>';
      statusEl.textContent = 'Waiting for input.';
      copyBtn.disabled = true;
      printBtn.disabled = true;
    }

    copyBtn.addEventListener('click', copyPlainText);
    printBtn.addEventListener('click', () => window.print());
    resetBtn.addEventListener('click', resetForm);
    form.addEventListener('submit', generateSOP);

    loadApiKey();
  </script>
</body>
</html>
